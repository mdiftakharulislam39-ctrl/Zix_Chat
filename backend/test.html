<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zix_Chat Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    h2 {
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      font-size: 28px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    label {
      font-weight: bold;
      color: #667eea;
    }
    #username {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 2px solid #667eea;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    #messages {
      border: none;
      background: #f5f6fa;
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      margin: 16px 0;
      border-radius: 12px;
    }
    .msg {
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 75%;
      word-wrap: break-word;
      color: white;
      font-size: 14px;
      animation: pop 0.2s ease;
    }
    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .msg.me {
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin-left: auto;
      text-align: right;
    }
    .msg.other {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    #messageInput {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
    }
    #messageInput:focus {
      border-color: #667eea;
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <h2>💬 Zix_Chat</h2>
  <div class="card">
    <label>Username:</label>
    <input type="text" id="username" placeholder="Your name" value="User1">

    <div id="messages"></div>

    <div class="input-row">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io("http://localhost:5000");

    socket.on("connect", () => {
      console.log("Connected to server:", socket.id);
    });

    function addMessageToUI(sender, text) {
      const messagesDiv = document.getElementById("messages");
      const myUsername = document.getElementById("username").value;
      const msgEl = document.createElement("div");
      msgEl.className = "msg " + (sender === myUsername ? "me" : "other");
      msgEl.textContent = `${sender}: ${text}`;
      messagesDiv.appendChild(msgEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    socket.on("load_old_messages", (messages) => {
      messages.forEach((msg) => {
        addMessageToUI(msg.sender_username, msg.message_text);
      });
    });

    socket.on("receive_message", (data) => {
      addMessageToUI(data.username, data.text);
    });

    function sendMessage() {
      const username = document.getElementById("username").value || "Anonymous";
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;

      socket.emit("send_message", { username, text });
      input.value = "";
    }

    document.getElementById("messageInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
