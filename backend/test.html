<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zix_Chat Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #messages div { margin-bottom: 8px; padding: 6px; background: #f0f0f0; border-radius: 6px; }
    input { width: 70%; padding: 8px; }
    button { padding: 8px 16px; }
  </style>
</head>
<body>
  <h2>Zix_Chat - Test Page</h2>
  <p>Username: <input type="text" id="username" placeholder="Your name" value="User1"></p>
  <div id="messages"></div>
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io("http://localhost:5000");

    socket.on("connect", () => {
      console.log("Connected to server:", socket.id);
    });

    // পুরনো মেসেজ লোড করা
    socket.on("load_old_messages", (messages) => {
      console.log("Loading old messages:", messages);
      const messagesDiv = document.getElementById("messages");
      messages.forEach((msg) => {
        const msgEl = document.createElement("div");
        msgEl.textContent = `${msg.sender_username}: ${msg.message_text}`;
        messagesDiv.appendChild(msgEl);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // নতুন মেসেজ আসলে
    socket.on("receive_message", (data) => {
      const messagesDiv = document.getElementById("messages");
      const msgEl = document.createElement("div");
      msgEl.textContent = `${data.username}: ${data.text}`;
      messagesDiv.appendChild(msgEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    function sendMessage() {
      const username = document.getElementById("username").value || "Anonymous";
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;

      socket.emit("send_message", { username, text });
      input.value = "";
    }

    document.getElementById("messageInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
